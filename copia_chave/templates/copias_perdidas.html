{% extends 'index.html' %}
{% load django_bootstrap5 %}
{% load static %}
{% block content %}
<section class="section">
    <div class="container">
        <form action="" method="GET">
            <div class="form-group row p-3">
                <label class="col-sm-2 col-form-label">Nome do Copia:</label>

                <div class="col-sm-8">
                    <input class="form-control" type="text" name="buscar" value="{{ request.GET.buscar }}"
                           placeholder="Digite o nome da copia">
                </div>
                <div class="col-sm-2">
                    <button type="submit" class="btn btn-primary">
                        Buscar
                    </button>
                </div>
            </div>
        </form>
        {% if object_list %}
            <div class="card shadow">
                <div class="card-body">
                    <h3 class="text-center mb-4">
                        Copias Perdidas ou Danificadas
                    </h3>
                    <div class="table-responsive">
                        <table class="table table-hover">

                            <thead class="table-danger">
                                <tr>
                                    <th>Nome</th>
                                    <th>Status</th>
                                    <th>Ações</th>
                                </tr>
                            </thead>
                            <tbody>
                                {% for copias in object_list %}
                                    <tr>
                                        <td>{{ copia_chave.nome }}</td>

                                        <td>
                                            <span class="badge bg-danger">
                                                Perdida
                                            </span>
                                        </td>
                                        <td class="text-center">
                                            <a href="{% url 'copia_chave_editar' copia.pk %}">
                                                <i class="bi bi-pencil-square"></i>
                                            </a>

                                            <a href="{% url 'copia_chave_apagar' copia.pk %}">
                                                <i class="bi bi-trash3"></i>
                                            </a>
                                        </td>
                                    </tr>
                                {% endfor %}
                            </tbody>
                        </table>
                    </div>

                </div>
            </div>
        {% endif %}
    </div>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
          rel="stylesheet">
</section>
{% endblock %}
